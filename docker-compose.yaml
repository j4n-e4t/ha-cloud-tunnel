services:
  server:
    build: ./server
    ports:
      - "7777:7777" # Tunnel port
      - "80:80" # Public Ingress
    volumes:
      - server-data:/data
    deploy:
      resources:
        limits:
          cpus: "1"
          memory: 256M
        reservations:
          memory: 64M
    restart: unless-stopped

  client:
    build:
      context: ./client
      args:
        BUILD_FROM: alpine:3.19
    environment:
      - SERVER_ADDR=server:7777
      - TOKEN=${TOKEN}
      - FINGERPRINT=${FINGERPRINT}
      - TARGET_ADDR=homeassistant:80
    volumes:
      - client-data:/data
    depends_on:
      - server
    command: ["/app/client"]
    deploy:
      resources:
        limits:
          cpus: "0.5"
          memory: 128M
        reservations:
          memory: 32M
    restart: unless-stopped

  # Mock Home Assistant for testing
  homeassistant:
    image: nginx:alpine
    ports:
      - "8123:80" # Home Assistant mock
    deploy:
      resources:
        limits:
          cpus: "0.25"
          memory: 64M

volumes:
  server-data:
  client-data:
